<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Aniversário, Luana!</title>

  <!-- Preload correto das imagens -->

  <link rel="preload" as="image" href="/L1.jpg">
  <link rel="preload" as="image" href="/L2.jpg">
  <link rel="preload" as="image" href="/L3.jpg">
  <link rel="preload" as="image" href="/L4.jpg">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      backdrop-filter: brightness(0.7);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      animation: carrosselFundo 40s infinite;
    }

    @keyframes carrosselFundo {
      0%   { background-image: url('/L1.jpg'); }
      25%  { background-image: url('/L1.jpg'); }
      40%  { background-image: url('/L2.jpg'); }
      65%  { background-image: url('/L3.jpg'); }
      100% { background-image: url('/L4.jpg'); }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .mensagem {
      position: relative;
      z-index: 1;
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 20px;
      max-width: 90%;
      width: 600px;
      margin-bottom: 40px;
      animation: fadein 2s ease-in;
      display: none;
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
      animation: flutuar 2s ease-in-out infinite;
    }

    #typed {
      font-size: 1.1em;
      line-height: 1.6em;
      margin: 20px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      background-color: #ff69b4;
      color: white;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background-color: #ff1493;
    }

    button:active {
      transform: scale(0.95);
    }

    #extra {
      margin-top: 20px;
      display: none;
      font-size: 1.3em;
      background-color: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 15px;
      animation: fadein 1s ease-in;
    }

    .emoji {
      position: absolute;
      font-size: 48px;
      opacity: 0.9;
      animation: subir 8s infinite ease-in;
      pointer-events: none;
    }

    .presente {
      font-size: 80px;
      cursor: pointer;
      animation: flutuar 3s ease-in-out infinite;
      z-index: 2;
      position: relative;
      margin-top: 30vh;
      transition: transform 0.3s;
      user-select: none;
    }

    .presente:hover {
      transform: scale(1.2);
    }

    .presente:active {
      transform: scale(0.9);
    }

    #audioControl {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      background-color: rgba(0, 0, 0, 0.6);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    #audioControl:hover {
      transform: scale(1.1);
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flutuar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes subir {
      0% { transform: translateY(100vh); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* Responsividade para mobile */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.5em;
      }
      
      #typed {
        font-size: 1em;
      }
      
      .presente {
        font-size: 60px;
        margin-top: 25vh;
      }
      
      .emoji {
        font-size: 32px;
      }

      .mensagem {
        width: 90%;
        padding: 15px;
      }
    }
  </style>

</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Áudio com controle manual (sem autoplay) -->

  <audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
  </audio>

<button id="audioControl" onclick="toggleAudio()" title="Clique para música">🔇</button>

  <div id="presenteFlutuante" class="presente" onclick="abrirPresente()">🎁</div>

  <div class="emoji" style="left:10%; animation-delay: 0s; color: #FFD700">🎈</div>
  <div class="emoji" style="left:25%; animation-delay: 2s; color: #FF69B4">🌸</div>
  <div class="emoji" style="left:50%; animation-delay: 4s; color: #ADFF2F">🎉</div>
  <div class="emoji" style="left:70%; animation-delay: 6s; color: #00BFFF">✨</div>
  <div class="emoji" style="left:85%; animation-delay: 8s; color: #FF4500">🎁</div>

  <div id="mensagemConteudo" class="mensagem">
    <h1>Feliz Aniversário, Luana! 🎉</h1>
    <p id="typed"></p>
    <button onclick="mostrarMensagem()">Clique aqui para uma surpresa</button>
    <p id="extra">Parabéns! Que seu dia seja incrível! 🎂✨🎈</p>
  </div>

  <script>
    // IMPORTANTE: Coloque sua mensagem personalizada aqui!
    const texto = `Hoje é um dia muito especial!
    
Quero te desejar um aniversário repleto de alegria, amor e realizações.

Que todos os seus sonhos se tornem realidade e que você continue espalhando essa luz por onde passar.

Você merece tudo de mais lindo que a vida pode oferecer! 💖`;

    let i = 0;
    let audioPlaying = false;
    
    function digitar() {
      if (i < texto.length) {
        document.getElementById("typed").innerHTML += texto.charAt(i);
        i++;
        setTimeout(digitar, 30);
      }
    }

    function abrirPresente() {
      document.getElementById("presenteFlutuante").style.display = "none";
      document.getElementById("mensagemConteudo").style.display = "block";
      digitar();
      
      // Tentar iniciar áudio após interação do usuário
      if (!audioPlaying) {
        toggleAudio();
      }
    }

    function mostrarMensagem() {
      document.getElementById('extra').style.display = 'block';
      launchFireworks();
    }

    function toggleAudio() {
      const audio = document.getElementById('bgMusic');
      const button = document.getElementById('audioControl');
      
      if (audioPlaying) {
        audio.pause();
        button.textContent = '🔇';
        audioPlaying = false;
      } else {
        audio.play().then(() => {
          button.textContent = '🔊';
          audioPlaying = true;
        }).catch(err => {
          console.log('Erro ao tocar áudio:', err);
        });
      }
    }

    // Canvas e fogos de artifício
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    // Ajustar quantidade de partículas baseado no dispositivo
    const isMobile = window.innerWidth < 768;
    const particleCount = isMobile ? 30 : 80;

    function createFirework(x, y) {
      const colors = ['#ff0043', '#ffcc00', '#00e5ff', '#adff2f', '#ff69b4'];
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x, y,
          radius: Math.random() * 2 + 1,
          angle: Math.random() * 2 * Math.PI,
          speed: Math.random() * 5 + 2,
          alpha: 1,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Corrigido: filtrar em vez de splice durante iteração
      particles = particles.filter(p => {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.alpha -= 0.01;
        
        if (p.alpha > 0) {
          ctx.beginPath();
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle = p.color;
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
          return true;
        }
        return false;
      });
      
      ctx.globalAlpha = 1;
      requestAnimationFrame(animateFireworks);
    }

    function launchFireworks() {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          // Variar posição dos fogos
          const offsetX = (Math.random() - 0.5) * 300;
          const offsetY = (Math.random() - 0.5) * 200;
          createFirework(centerX + offsetX, centerY + offsetY);
        }, i * 500);
      }
    }

    // Redimensionar canvas quando janela muda
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    animateFireworks();
  </script>

</body>
</html>
